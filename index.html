:root{--gold:#C9A84C;--gold-light:#DABB6A;--gold-dark:#8A7235;--cream:#F5F0E8;--bg:#0C0A08;--bg-card:rgba(255,255,255,0.04);--text:#F0EAE0;--text-muted:#8A8478;--serif:'Cormorant Garamond',Georgia,serif;--sans:'DM Sans',-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(201,168,76,.1)}50%{box-shadow:0 0 40px rgba(201,168,76,.2)}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.hero-section{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;background:#0a0806}
.hero-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.28;z-index:0;pointer-events:none;mix-blend-mode:lighten}
.hero-bg{position:absolute;inset:0;z-index:1;background:radial-gradient(ellipse 100% 70% at 50% 10%,rgba(201,168,76,.14) 0%,transparent 55%),radial-gradient(ellipse 70% 50% at 15% 80%,rgba(140,70,20,.18) 0%,transparent 50%),radial-gradient(ellipse 60% 50% at 85% 70%,rgba(100,50,10,.14) 0%,transparent 50%),linear-gradient(180deg,rgba(10,8,6,.6) 0%,rgba(10,8,6,0) 35%,rgba(10,8,6,.1) 60%,rgba(10,8,6,.8) 100%)}
.hero-orb{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:1}
.hero-orb-1{width:70vmax;height:70vmax;top:-15%;left:-20%;background:radial-gradient(circle,rgba(201,168,76,.09) 0%,transparent 65%);animation:orbPulse1 14s ease-in-out infinite}
.hero-orb-2{width:50vmax;height:50vmax;bottom:-10%;right:-10%;background:radial-gradient(circle,rgba(160,80,20,.13) 0%,transparent 60%);animation:orbPulse2 10s ease-in-out 2s infinite}
.hero-orb-3{width:40vmax;height:40vmax;top:30%;left:55%;background:radial-gradient(circle,rgba(201,150,50,.07) 0%,transparent 60%);animation:orbPulse3 16s ease-in-out 5s infinite}
.particle{position:absolute;width:2px;height:2px;background:var(--gold);border-radius:50%;animation:particleFloat 8s ease-in-out infinite}
.nav-sticky{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(12,10,8,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,.1);transform:translateY(-100%);transition:transform .4s ease}.nav-sticky.visible{transform:translateY(0)}

.cat-sheet-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 16px 8px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.cat-sheet-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:16px;border:1px solid rgba(201,168,76,.1);background:rgba(255,255,255,.03);cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.cat-sheet-btn.active{border-color:rgba(201,168,76,.45);background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.05))}
.cat-sheet-btn.active::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.08),transparent);pointer-events:none}
.cat-sheet-icon{font-size:26px;line-height:1}
.cat-sheet-name{font-family:var(--sans);font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;letter-spacing:.04em;line-height:1.2}
.cat-sheet-btn.active .cat-sheet-name{color:var(--gold)}
/* Botón selector en topbar móvil */
.cat-nav-mobile{display:none;align-items:center;gap:0;flex:1;min-width:0}
.cat-nav-arrow{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;border:1px solid rgba(201,168,76,.25);background:rgba(201,168,76,.08);color:var(--gold);font-size:14px;cursor:pointer;flex-shrink:0;transition:all .2s}.cat-nav-arrow:active{background:rgba(201,168,76,.25);transform:scale(.92)}
.cat-nav-center{display:flex;align-items:center;justify-content:center;gap:8px;flex:1;min-width:0;border:none;background:none;cursor:pointer;padding:6px 8px;border-radius:10px;transition:background .2s}.cat-nav-center:active{background:rgba(201,168,76,.08)}
.cat-nav-icon{font-size:20px;flex-shrink:0}
.cat-nav-name{font-family:var(--serif);font-size:15px;font-weight:600;color:var(--gold);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-nav-grid-icon{font-size:11px;color:rgba(201,168,76,.5);flex-shrink:0;letter-spacing:-2px}
@media(max-width:768px){.menu-topbar{padding:10px 12px;gap:8px;flex-wrap:nowrap}.menu-cats-wrap{display:none!important}.menu-actions{display:none}.cat-nav-mobile{display:flex!important}}
.menu-content::-webkit-scrollbar{width:4px}.menu-content::-webkit-scrollbar-track{background:transparent}.menu-content::-webkit-scrollbar-thumb{background:rgba(201,168,76,.2);border-radius:4px}
.subview-bar{display:flex;align-items:center;gap:12px;padding:14px 20px 0;margin-bottom:32px}
.back-btn{display:flex;align-items:center;gap:8px;background:none;border:1px solid rgba(201,168,76,.2);color:var(--gold);font-family:var(--sans);font-size:13px;padding:8px 16px;border-radius:20px;cursor:pointer;transition:all .3s;white-space:nowrap}.back-btn:hover{background:rgba(201,168,76,.08);border-color:var(--gold)}
.hero-line{width:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 28px;animation:lineIn 1s cubic-bezier(.23,1,.32,1) .4s forwards}
.hero-isotipo{opacity:0;animation:isotipoIn .9s cubic-bezier(.23,1,.32,1) .7s forwards}
.hero-title{opacity:0;animation:logoReveal 1s cubic-bezier(.23,1,.32,1) 1s forwards}
.hero-sub{opacity:0;animation:subtitleReveal .9s cubic-bezier(.23,1,.32,1) 1.3s forwards}
.hero-tagline{opacity:0;animation:taglineReveal .8s ease 1.6s forwards}
.hero-btn1{opacity:0;animation:btnReveal .7s ease 1.9s forwards}
.hero-btn2{opacity:0;animation:btnReveal .7s ease 2.1s forwards}
.hero-social{opacity:0;animation:btnReveal .7s ease 2.3s forwards}
`;

const Tag = ({label}) => <span className={`tag tag-${label}`}>{label}</span>;

// Configuraciones de calidad de imagen
const QUALITY_PRESETS = {
  alta: { maxSize: 1600, quality: 0.92, label: '🔥 Alta', desc: 'Máxima calidad, archivo más grande' },
  media: { maxSize: 1200, quality: 0.85, label: '⚡ Media', desc: 'Buen balance calidad/tamaño' },
  baja: { maxSize: 600, quality: 0.7, label: '💨 Baja', desc: 'Carga rápida, menor calidad' },
};

const ImgUpload = ({value, onChange, label="Imagen", imgFit, imgPos, onFitChange, onPosChange}) => {
  const fileRef = useRef(null);
  const [uploading, setUploading] = useState(false);
  const [uploadMsg, setUploadMsg] = useState('');
  const [quality, setQuality] = useState('alta');
  
  // Comprimir imagen según preset de calidad seleccionado
  const compressImage = (file, preset) => new Promise((res) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = preset.maxSize;
        let w = img.width, h = img.height;
        // Solo redimensionar si es más grande que el máximo
        if (w > MAX || h > MAX) {
          if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
          else { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
        }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        // Mejorar calidad de renderizado
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, w, h);
        const result = canvas.toDataURL('image/jpeg', preset.quality);
        res(result);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
  
  const uploadToDrive = async (file) => {
    setUploading(true);
    const preset = QUALITY_PRESETS[quality];
    const sizeMB = (file.size / 1024 / 1024).toFixed(1);
    setUploadMsg(`Procesando (${sizeMB}MB → calidad ${preset.label})...`);
    try {
      const b64 = await compressImage(file, preset);
      const fname = 'paranoia_' + Date.now() + '.jpg';
      
      // Mostrar tamaño resultante
      const resultKB = Math.round((b64.length * 3/4) / 1024);
      setUploadMsg(`Subiendo a Drive (${resultKB}KB)...`);
      
      await fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ action: 'upload_image', image: b64, fileName: fname })
      });
      
      setUploadMsg('Procesando en Drive...');
      await new Promise(r => setTimeout(r, 4000));
      
      setUploadMsg('Obteniendo URL...');
      const check = await fetch(GOOGLE_SCRIPT_URL + '?action=get_last_image', {redirect:'follow'});
      const json = await check.json();
      
      if (json.status === 'success' && json.url) {
        onChange(json.url);
        setUploadMsg(`✅ ¡Subida exitosa! (${resultKB}KB, ${preset.label})`);
      } else {
        onChange(b64);
        setUploadMsg('⚠️ Guardada localmente (alta calidad)');
      }
    } catch(e) {
      try { const b64 = await compressImage(file, preset); onChange(b64); } catch(e2) {}
      setUploadMsg('⚠️ Guardada localmente');
    }
    setUploading(false);
    setTimeout(() => setUploadMsg(''), 4000);
  };
  
  const fitOpts = ['cover','contain','fill'];
  const posOpts = ['center','top','bottom','left','right'];
  
  return (
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      <label style={{fontSize:10,color:'var(--gold-dark)',textTransform:'uppercase',letterSpacing:'.1em'}}>{label}</label>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        <input className="adm" value={typeof value==='string'&&!value.startsWith('data:')?value:''} onChange={e=>onChange(e.target.value)} placeholder="URL de imagen o sube archivo" style={{fontSize:11,flex:1}}/>
        <button onClick={()=>fileRef.current?.click()} disabled={uploading} style={{padding:'8px 12px',borderRadius:8,border:'1px solid rgba(201,168,76,.2)',background:uploading?'rgba(201,168,76,.15)':'rgba(201,168,76,.06)',color:'var(--gold)',fontSize:11,cursor:uploading?'wait':'pointer',whiteSpace:'nowrap'}}>{uploading?'⏳ Subiendo...':'📁 Subir a Drive'}</button>
        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={async e=>{const f=e.target.files?.[0];if(f)uploadToDrive(f);}}/>
      </div>
      {/* Selector de calidad */}
      <div className="quality-selector">
        <span style={{fontSize:9,color:'var(--text-muted)'}}>Calidad:</span>
        {Object.entries(QUALITY_PRESETS).map(([k, v]) => (
          <button key={k} onClick={() => setQuality(k)} title={v.desc}
            style={{
              background: quality === k ? 'rgba(201,168,76,.15)' : 'transparent',
              color: quality === k ? 'var(--gold)' : 'var(--text-muted)',
              borderColor: quality === k ? 'var(--gold-dark)' : 'rgba(255,255,255,.1)'
            }}>{v.label}</button>
        ))}
      </div>
      {uploadMsg&&<p style={{fontSize:10,color:uploadMsg.includes('✅')?'#66BB6A':uploadMsg.includes('⚠️')?'#FFB74D':'#42A5F5'}}>{uploadMsg}</p>}
      {value && <div style={{display:'flex',flexDirection:'column',gap:6}}>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <img src={value} alt="" style={{width:80,height:55,borderRadius:6,objectFit:imgFit||'cover',objectPosition:imgPos||'center',background:'#1a1512',border:'1px solid rgba(201,168,76,.15)'}}/>
          <button onClick={()=>onChange('')} style={{padding:'4px 10px',borderRadius:6,border:'1px solid rgba(239,83,80,.3)',background:'rgba(239,83,80,.08)',color:'#EF5350',fontSize:10,cursor:'pointer'}}>🗑</button>
          {typeof value==='string'&&value.startsWith('data:')&&<span style={{fontSize:9,color:'#FFB74D'}}>⚠️ Local</span>}
          {typeof value==='string'&&value.includes('drive.google.com')&&<span style={{fontSize:9,color:'#66BB6A'}}>☁️ Drive</span>}
        </div>
        {onFitChange&&<div style={{display:'flex',gap:3,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{fontSize:9,color:'var(--text-muted)'}}>Ajuste:</span>
          {fitOpts.map(f=><button key={f} onClick={()=>onFitChange(f)} style={{padding:'2px 7px',borderRadius:6,fontSize:9,border:'1px solid',cursor:'pointer',background:(imgFit||'cover')===f?'rgba(201,168,76,.15)':'transparent',color:(imgFit||'cover')===f?'var(--gold)':'var(--text-muted)',borderColor:(imgFit||'cover')===f?'var(--gold-dark)':'rgba(255,255,255,.1)'}}>{f==='cover'?'Llenar':f==='contain'?'Ajustar':'Estirar'}</button>)}
        </div>}
        {onPosChange&&<div style={{display:'flex',gap:3,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{fontSize:9,color:'var(--text-muted)'}}>Posición:</span>
          {posOpts.map(p=><button key={p} onClick={()=>onPosChange(p)} style={{padding:'2px 6px',borderRadius:6,fontSize:8,border:'1px solid',cursor:'pointer',background:(imgPos||'center')===p?'rgba(201,168,76,.15)':'transparent',color:(imgPos||'center')===p?'var(--gold)':'var(--text-muted)',borderColor:(imgPos||'center')===p?'var(--gold-dark)':'rgba(255,255,255,.1)'}}>{{'center':'Centro','top':'Arriba','bottom':'Abajo','left':'Izq','right':'Der'}[p]}</button>)}
        </div>}
      </div>}
    </div>
  );
};

  <img src={ISOTIPO_B64} alt="" aria-hidden="true"

const MenuCard = ({item, onClick, delay=0, imagesEnabled=true, catColor='201,168,76'}) => {
  const [ld,setLd]=useState(false);const [err,setErr]=useState(false);const ref=useRef(null);const [vis,setVis]=useState(false);const [hov,setHov]=useState(false);
  const hasImg = imagesEnabled && item.img && item.img.length > 5;
  useEffect(()=>{setLd(false);setErr(false);},[item.img]);
  useEffect(()=>{const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVis(true);o.disconnect();}},{threshold:.05});if(ref.current)o.observe(ref.current);return()=>o.disconnect();},[]);
  const ico={entradas:'🥗',cocteles:'🍸',bebidas:'☕',bebidasfrias:'🥤',bebidascalientes:'☕',vinos:'🍷',postres:'🍰',mariscos:'🦞',pasta:'🍝',grill:'🔥',cortes:'🥩',rapidos:'🍔',especial:'⭐',cervezas:'🍺'};
  const animStyle={opacity:vis?1:0,transform:vis?'none':'translateY(36px) scale(.97)',transition:`opacity .65s cubic-bezier(.23,1,.32,1) ${delay}s, transform .65s cubic-bezier(.23,1,.32,1) ${delay}s`,filter:item.available?'none':'grayscale(.5) opacity(.6)'};
  if(!imagesEnabled){
    return(<div ref={ref} className="menu-card text-only-card" onClick={()=>item.available&&onClick(item)} style={{...animStyle,borderColor:hov?`rgba(${catColor},.3)`:'rgba(255,255,255,.06)',borderLeftColor:hov?`rgba(${catColor},.6)`:'transparent'}} onMouseOver={()=>setHov(true)} onMouseOut={()=>setHov(false)}>
      <div className="toc-wrap">
        <div className="toc-left">
          <div className="toc-header">
            <span className="toc-cat">{ico[item.cat]||'🍽️'}</span>
            {item.tags?.map(t=><Tag key={t} label={t}/>)}
            {!item.available&&<Tag label="agotado"/>}
          </div>
          <h3 className="toc-name">{item.name}</h3>
          <p className="toc-desc">{item.desc}</p>
        </div>
        <div className="toc-right">
          <span style={{fontFamily:'var(--serif)',fontSize:21,fontWeight:700,color:`rgba(${catColor},1)`}}>{item.price?`$${item.price.toFixed(2)}`:'Consultar'}</span>
        </div>
      </div>
    </div>);
  }
  return (<div ref={ref} className="menu-card" onClick={()=>item.available&&onClick(item)} onMouseOver={()=>setHov(true)} onMouseOut={()=>setHov(false)} style={{...animStyle,border:`1px solid rgba(${catColor},${hov?.25:.1})`,boxShadow:hov?`0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(${catColor},.1),0 4px 30px rgba(${catColor},.1)`:'none',transform:vis?(hov?'translateY(-7px) scale(1.01)':'translateY(0)'):'translateY(36px) scale(.97)',transition:`all .45s cubic-bezier(.23,1,.32,1) ${delay}s`}}>
    <div style={{position:'relative',width:'100%',height:200,overflow:'hidden',background:`linear-gradient(135deg,#1a1512,rgba(${catColor},.06))`}}>
      {hasImg&&!err&&<img src={item.img} alt={item.name} className="card-img" referrerPolicy="no-referrer" onLoad={()=>setLd(true)} onError={()=>setErr(true)} style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:item.imgFit||'cover',objectPosition:item.imgPos||'center',opacity:ld?1:0,transition:'opacity .5s',transform:hov?'scale(1.08)':'scale(1)'}}/>}
      {hasImg&&!ld&&!err&&<div style={{position:'absolute',inset:0,background:'linear-gradient(90deg,#1a1512 25%,#241e18 50%,#1a1512 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>}
      {(!hasImg||err)&&<div style={{position:'absolute',inset:0,background:`linear-gradient(135deg,#1a1410,rgba(${catColor},.08),#1a1410)`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8}}><span style={{fontSize:40,opacity:.5,filter:`drop-shadow(0 0 12px rgba(${catColor},.4))`}}>{ico[item.cat]||'🍽️'}</span><span style={{fontSize:10,color:`rgba(${catColor},.5)`,letterSpacing:'.1em',textTransform:'uppercase'}}>Paranoia</span></div>}
      <div style={{position:'absolute',bottom:0,left:0,right:0,height:'60%',background:`linear-gradient(transparent,rgba(12,10,8,.95))`}}/>
      {item.tags?.length>0&&<div style={{position:'absolute',top:10,left:10,display:'flex',flexWrap:'wrap',gap:4}}>{item.tags.map(t=><Tag key={t} label={t}/>)}</div>}
      {!item.available&&<div style={{position:'absolute',top:10,right:10}}><Tag label="agotado"/></div>}
    </div>
    <div style={{padding:'16px 18px 18px',background:`linear-gradient(180deg,rgba(${catColor},.03) 0%,transparent 100%)`}}>
      <h3 style={{fontFamily:'var(--serif)',fontSize:20,fontWeight:600,color:'var(--text)',marginBottom:6,lineHeight:1.2}}>{item.name}</h3>
      <p style={{fontSize:12,color:'var(--text-muted)',lineHeight:1.5,marginBottom:12,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{item.desc}</p>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontFamily:'var(--serif)',fontSize:22,fontWeight:700,color:`rgba(${catColor},1)`}}>{item.price?`$${item.price.toFixed(2)}`:'Consultar'}</span>
        <span style={{fontSize:11,color:`rgba(${catColor},.6)`,fontWeight:500}}>Ver más →</span>
      </div>
    </div>
  </div>);
};

const DetailModal = ({item,onClose,imagesEnabled=true}) => {
  if(!item)return null;
  const hasImg = imagesEnabled && item.img && item.img.length > 5;
  const ico={entradas:'🥗',cocteles:'🍸',bebidas:'☕',bebidasfrias:'🥤',bebidascalientes:'☕',vinos:'🍷',postres:'🍰',mariscos:'🦞',pasta:'🍝',grill:'🔥',cortes:'🥩',rapidos:'🍔',especial:'⭐',cervezas:'🍺'};
  return(<div className="modal-overlay" onClick={onClose}><div className="modal-content" onClick={e=>e.stopPropagation()}>
  <div style={{position:'relative'}}>
    {hasImg?<img src={item.img} alt={item.name} referrerPolicy="no-referrer" style={{width:'100%',height:280,objectFit:item.imgFit||'cover',objectPosition:item.imgPos||'center',borderRadius:'20px 20px 0 0'}}/>
    :<div style={{width:'100%',height:imagesEnabled?200:0,overflow:'hidden',borderRadius:'20px 20px 0 0',display:imagesEnabled?'flex':'none',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,background:'linear-gradient(135deg,#1a1410,#2a2018)'}}><span style={{fontSize:48,opacity:.4}}>{ico[item.cat]||'🍽️'}</span><span style={{fontSize:11,color:'var(--gold-dark)',letterSpacing:'.15em',textTransform:'uppercase'}}>Paranoia</span></div>}
    <button onClick={onClose} style={{position:'absolute',top:14,right:14,width:36,height:36,borderRadius:'50%',border:'none',background:'rgba(0,0,0,.6)',color:'white',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button><div style={{position:'absolute',bottom:0,left:0,right:0,height:'40%',background:'linear-gradient(transparent,#161210)'}}/>{item.tags?.length>0&&<div style={{position:'absolute',bottom:16,left:20,display:'flex',gap:6}}>{item.tags.map(t=><Tag key={t} label={t}/>)}</div>}</div>
  <div style={{padding:'20px 24px 28px'}}><h2 style={{fontFamily:'var(--serif)',fontSize:28,fontWeight:600,marginBottom:8}}>{item.name}</h2><p style={{fontSize:14,color:'var(--text-muted)',lineHeight:1.7,marginBottom:20}}>{item.desc}</p><div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 0',borderTop:'1px solid rgba(201,168,76,.1)'}}><span style={{fontFamily:'var(--serif)',fontSize:32,fontWeight:700,color:'var(--gold)'}}>{item.price?`$${item.price.toFixed(2)}`:'Consultar precio'}</span>{!item.available&&<Tag label="agotado"/>}</div></div>
</div></div>);
};

const LoginModal = ({onSuccess,onClose}) => {
  const [u,setU]=useState('');const [p,setP]=useState('');const [err,setErr]=useState('');const [sp,setSp]=useState(false);
  const go=()=>{if(u==='Paranoia'&&p==='Paranoia2026.ec')onSuccess();else{setErr('Credenciales incorrectas');setTimeout(()=>setErr(''),3000);}};
  return(<div className="modal-overlay" onClick={onClose}><div className="modal-content" onClick={e=>e.stopPropagation()} style={{maxWidth:400,padding:32}}>
    <div style={{textAlign:'center',marginBottom:24}}><div style={{fontSize:32,marginBottom:8}}>🔒</div><h2 style={{fontFamily:'var(--serif)',fontSize:24,color:'var(--gold)',marginBottom:4}}>Acceso Admin</h2><p style={{fontSize:12,color:'var(--text-muted)'}}>Ingresa tus credenciales</p></div>
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      <input className="adm" placeholder="Usuario" value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()}/>
      <div style={{position:'relative'}}><input className="adm" type={sp?'text':'password'} placeholder="Contraseña" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()}/><button onClick={()=>setSp(!sp)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:13}}>{sp?'🙈':'👁️'}</button></div>
      {err&&<p style={{color:'#EF5350',fontSize:12,textAlign:'center'}}>{err}</p>}
      <button className="btn-gold" onClick={go} style={{width:'100%',marginTop:8}}>Ingresar</button>
      <button onClick={onClose} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:12,marginTop:4}}>Cancelar</button>
    </div>
  </div></div>);
};

// ─── ADMIN PANEL ───
const AdminPanel = ({data,onSave,onClose,syncStatus,imagesEnabled=true,onToggleImages}) => {

  const add=(c)=>{const nid=Math.max(...d.items.map(i=>i.id),0)+1;setD(p=>({...p,items:[...p.items,{id:nid,cat:c,name:'Nuevo Plato',desc:'Descripción',price:0,img:'https://images.pexels.com/photos/1640777/pexels-photo-1640777.jpeg?auto=compress&cs=tinysrgb&w=800',tags:[],available:true}]}));};

      <label style={{fontSize:11,color:'var(--gold)'}}>Párrafo 3</label>
      <textarea className="adm" value={d.about.p3} onChange={e=>setD(p=>({...p,about:{...p.about,p3:e.target.value}}))} rows={4} style={{resize:'vertical'}}/>
    </div>}

    {tab==='social'&&<div style={{display:'flex',flexDirection:'column',gap:14}}>
      {[{k:'instagram',l:'Instagram',ic:'📸'},{k:'facebook',l:'Facebook',ic:'👤'},{k:'whatsapp',l:'WhatsApp',ic:'💬'}].map(s=>(

          <span style={{fontSize:24}}>{s.ic}</span>

          <input className="adm" value={d.social[s.k]} onChange={e=>setD(p=>({...p,social:{...p.social,[s.k]:e.target.value}}))} placeholder={`Link de ${s.l}`} style={{marginTop:4,fontSize:12}}/></div>

          <div style={{display:'flex',flexDirection:'column',gap:8}}>

        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 18px',borderRadius:12,background:'rgba(255,255,255,.03)',border:`1px solid ${imagesEnabled?'rgba(201,168,76,.25)':'rgba(255,255,255,.06)'}`}}>

// ─── RATING ───

const StarInput = ({value, onSelect, label}) => {
  const [hov,setHov]=useState(0);
  return(<div style={{textAlign:'center',padding:14,borderRadius:12,background:'rgba(255,255,255,.02)',border:'1px solid rgba(201,168,76,.06)'}}>
    <p style={{fontSize:12,color:'var(--text-muted)',marginBottom:8}}>{label}</p>
    <div style={{display:'flex',gap:6,justifyContent:'center'}}>
      {[1,2,3,4,5].map(s=>(
        <span key={s} role="button" tabIndex={0}
          onMouseEnter={()=>setHov(s)} onMouseLeave={()=>setHov(0)}
          onClick={()=>onSelect(s)}
          style={{fontSize:28,cursor:'pointer',display:'inline-block',lineHeight:1,userSelect:'none',WebkitTapHighlightColor:'transparent',transition:'transform .15s',transform:s<=(hov||value)?'scale(1.1)':'scale(1)'}}
        >{s<=(hov||value)?'⭐':'☆'}</span>
      ))}
    </div>
    {value>0&&<p style={{fontSize:10,color:'var(--gold)',marginTop:4}}>{value}/5</p>}
  </div>);
};

const RatingSection = ({waitresses}) => {
  const [food,setFood]=useState(0);
  const [service,setService]=useState(0);
  const [ambience,setAmbience]=useState(0);
  const [waitress,setWaitress]=useState('');
  const [name,setName]=useState('');
  const [comment,setComment]=useState('');
  const [submitted,setSubmitted]=useState(false);
  const [sending,setSending]=useState(false);
  const [reviews,setReviews]=useState([]);
  
  useEffect(()=>{try{const v=localStorage.getItem('paranoia-reviews');if(v)setReviews(JSON.parse(v));}catch(e){}},[]);
  
  const canSubmit = food > 0 && !sending;
  
  const handleSubmit=()=>{
    if(!canSubmit)return;
    setSending(true);
    const rev={name:name||'Anónimo',food,service,ambience,waitress,comment,date:new Date().toLocaleDateString('es-EC')};
    const up=[rev,...reviews].slice(0,30);
    setReviews(up);
    try{localStorage.setItem('paranoia-reviews',JSON.stringify(up));}catch(e){}
    // Enviar a Google Sheets
    try{
      const params=new URLSearchParams({
        action:'submit',
        nombre:name||'Anónimo',
        comida:String(food),
        servicio:String(service),
        ambiente:String(ambience),
        mesera:waitress||'No especificada',
        comentario:comment||''
      });
      const img=new Image();
      img.src=GOOGLE_SCRIPT_URL+'?'+params.toString();
    }catch(e){}
    setTimeout(()=>{
      setSending(false);
      setSubmitted(true);
      setTimeout(()=>{
        setSubmitted(false);
        setFood(0);setService(0);setAmbience(0);setWaitress('');setName('');setComment('');
      },3500);
    },800);
  };
  
  const avg=(field)=>{const r=reviews.filter(x=>x[field]);return r.length?(r.reduce((s,x)=>s+(x[field]||0),0)/r.length).toFixed(1):'—';};

  return(<div>
    <div style={{background:'var(--bg-card)',border:'1px solid rgba(201,168,76,.1)',borderRadius:16,padding:'28px 24px',maxWidth:600,margin:'0 auto'}}>
      {submitted?(<div style={{textAlign:'center',animation:'scaleIn .4s',padding:20}}><div style={{fontSize:48,marginBottom:12}}>🙏</div><h3 style={{fontFamily:'var(--serif)',fontSize:22,color:'var(--gold)',marginBottom:8}}>¡Gracias por tu opinión!</h3><p style={{fontSize:13,color:'var(--text-muted)'}}>Tu encuesta fue enviada a nuestra base de datos</p></div>):(<>
        {/* Waitress selection */}
        {waitresses?.length>0&&<div style={{marginBottom:20}}>
          <p style={{fontSize:12,color:'var(--text-muted)',marginBottom:10,textAlign:'center'}}>¿Quién te atendió?</p>
          <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
            {waitresses.map(w=>(<div key={w.id} onClick={()=>setWaitress(w.name)} style={{cursor:'pointer',textAlign:'center',padding:8,borderRadius:12,border:`2px solid ${waitress===w.name?'var(--gold)':'rgba(201,168,76,.1)'}`,background:waitress===w.name?'rgba(201,168,76,.06)':'transparent',transition:'all .3s',minWidth:70}}>
              <img src={w.img} alt={w.name} style={{width:50,height:50,borderRadius:'50%',objectFit:'cover',marginBottom:6,border:waitress===w.name?'2px solid var(--gold)':'2px solid transparent'}}/>
              <p style={{fontSize:11,color:waitress===w.name?'var(--gold)':'var(--text-muted)',fontWeight:waitress===w.name?600:400}}>{w.name}</p>
            </div>))}
          </div>
        </div>}
        {/* Ratings */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:16,marginBottom:20}}>
          <StarInput value={food} onSelect={setFood} label="🍽️ Comida"/>
          <StarInput value={service} onSelect={setService} label="👩‍🍳 Servicio"/>
          <StarInput value={ambience} onSelect={setAmbience} label="✨ Ambiente"/>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <input className="adm" placeholder="Tu nombre (opcional)" value={name} onChange={e=>setName(e.target.value)}/>
          <textarea className="adm" placeholder="Cuéntanos tu experiencia..." value={comment} onChange={e=>setComment(e.target.value)} rows={3} style={{resize:'vertical'}}/>
          <div role="button" onClick={handleSubmit} style={{width:'100%',padding:'14px 32px',borderRadius:30,border:'none',background:canSubmit?'linear-gradient(135deg,#C9A84C,#8A7235)':'rgba(201,168,76,.2)',color:canSubmit?'#0C0A08':'#8A8478',fontFamily:'var(--sans)',fontSize:15,fontWeight:700,cursor:canSubmit?'pointer':'default',transition:'all .3s',textAlign:'center',boxShadow:canSubmit?'0 8px 30px rgba(201,168,76,.3)':'none',letterSpacing:'.02em'}}>{sending?'⏳ Enviando...':'⭐ Enviar Calificación'}</div>
          {food===0&&<p style={{fontSize:11,color:'var(--text-muted)',textAlign:'center'}}>Califica al menos la comida para enviar</p>}
          <p style={{fontSize:10,color:'var(--gold-dark)',textAlign:'center',marginTop:2,letterSpacing:'.05em'}}>🔗 Conectado a base de datos en la nube</p>
        </div>
      </>)}
    </div>
    {reviews.length>0&&<div style={{marginTop:28}}>
      <div style={{display:'flex',justifyContent:'center',gap:24,marginBottom:20,flexWrap:'wrap'}}>
        {[{k:'food',l:'Comida'},{k:'service',l:'Servicio'},{k:'ambience',l:'Ambiente'}].map(c=>(
          <div key={c.k} style={{textAlign:'center'}}><span style={{fontFamily:'var(--serif)',fontSize:28,fontWeight:700,color:'var(--gold)'}}>{avg(c.k)}</span><p style={{fontSize:10,color:'var(--text-muted)'}}>{c.l}</p></div>
        ))}
      </div>
      <div style={{display:'grid',gap:10,maxWidth:600,margin:'0 auto'}}>
        {reviews.slice(0,5).map((r,i)=>(<div key={i} style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(201,168,76,.06)',borderRadius:12,padding:'12px 16px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}><span style={{fontWeight:600,fontSize:13}}>{r.name}</span><span style={{fontSize:10,color:'var(--text-muted)'}}>{r.date}</span></div>
          <div style={{display:'flex',gap:12,fontSize:11,color:'var(--text-muted)',marginBottom:4}}>
            {r.food&&<span>Comida {'⭐'.repeat(r.food)}</span>}{r.service&&<span>Servicio {'⭐'.repeat(r.service)}</span>}{r.ambience&&<span>Ambiente {'⭐'.repeat(r.ambience)}</span>}
          </div>
          {r.waitress&&<p style={{fontSize:11,color:'var(--gold-dark)'}}>Atendido por: {r.waitress}</p>}
          {r.comment&&<p style={{fontSize:12,color:'var(--text-muted)',lineHeight:1.5,marginTop:4}}>{r.comment}</p>}
        </div>))}
      </div>
    </div>}
  </div>);
};

// ═══ MAIN ═══
function App() {
  const [data,setData]=useState(D);
  const [activeCat,setActiveCat]=useState('especial');
  const [flipState,setFlipState]=useState('idle'); // 'idle'|'out'|'in'
  const [flipDir,setFlipDir]=useState('right');
  const [pendingCat,setPendingCat]=useState(null);
  const [sheetOpen,setSheetOpen]=useState(false);
  const topbarRef=useRef(null);
  const [selectedItem,setSelectedItem]=useState(null);
  const [showLogin,setShowLogin]=useState(false);
  const [showAdmin,setShowAdmin]=useState(false);
  const [heroLoaded,setHeroLoaded]=useState(false);
  const [splashDone,setSplashDone]=useState(false);
  const [tapCount,setTapCount]=useState(0);
  const [imagesEnabled,setImagesEnabled]=useState(()=>{try{const v=localStorage.getItem('paranoia-images');return v===null?true:v==='true';}catch(e){return true;}});
  useEffect(()=>{if(data.imagesEnabled!==undefined){setImagesEnabled(data.imagesEnabled);try{localStorage.setItem('paranoia-images',String(data.imagesEnabled));}catch(e){}}},[data.imagesEnabled]);

  const [menuLoading,setMenuLoading]=useState(true);
  const [syncStatus,setSyncStatus]=useState('');

  useEffect(()=>{
    // Intentar cargar menú desde la nube (Google Sheets)
    const loadCloud=async()=>{
      try{
        const ctrl=new AbortController();
        const timeout=setTimeout(()=>ctrl.abort(),6000);
        const r=await fetch(GOOGLE_SCRIPT_URL+'?action=load_menu',{signal:ctrl.signal,redirect:'follow'});
        clearTimeout(timeout);
        const json=await r.json();
        if(json.status==='success'&&json.data){
          // Comparar con localStorage: usar el más reciente
          let localData=null;
          try{const s=localStorage.getItem('paranoia-menu-v3');if(s)localData=JSON.parse(s);}catch(e){}
          const cloudTs=json.data.savedAt||0;
          const localTs=localData?.savedAt||0;
          if(localTs>cloudTs&&localData){
            // localStorage es más reciente (la nube no se actualizó), usarlo
            setData(localData);
          }else{
            setData(json.data);
            try{localStorage.setItem('paranoia-menu-v3',JSON.stringify(json.data));}catch(e){}
          }
          setMenuLoading(false);
          return;
        }
      }catch(e){}
      // Fallback: localStorage o datos por defecto
      try{
        const saved=localStorage.getItem('paranoia-menu-v3');
        const savedVer=localStorage.getItem('paranoia-menu-version');
        if(saved&&savedVer&&parseInt(savedVer)>=MENU_VERSION){
          setData(JSON.parse(saved));
        }else{
          localStorage.removeItem('paranoia-menu-v3');
          localStorage.setItem('paranoia-menu-version',String(MENU_VERSION));
        }
      }catch(e){}
      setMenuLoading(false);
    };
    loadCloud();
    setTimeout(()=>setHeroLoaded(true),300);
    setTimeout(()=>setSplashDone(true),1600);
  },[]);

  const saveData=async(d)=>{
    const d2={...d,savedAt:Date.now()};
    setData(d2);
    try{localStorage.setItem('paranoia-menu-v3',JSON.stringify(d2));localStorage.setItem('paranoia-menu-version',String(MENU_VERSION));}catch(e){}
    
    // Limpiar base64 para la nube (solo URLs)
    const cloudData = JSON.parse(JSON.stringify(d2));
    if(cloudData.items) cloudData.items = cloudData.items.map(item => ({...item, img: (item.img && item.img.startsWith('data:')) ? '' : item.img}));
    if(cloudData.waitresses) cloudData.waitresses = cloudData.waitresses.map(w => ({...w, img: (w.img && w.img.startsWith('data:')) ? '' : w.img}));
    
    setSyncStatus('syncing');
    try{
      // POST con mode:no-cors — el request SÍ llega a Apps Script aunque no podamos leer la respuesta
      await fetch(GOOGLE_SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'save_menu',menuData:cloudData})});
      // Esperar y verificar con GET
      await new Promise(r=>setTimeout(r,3000));
      const check=await fetch(GOOGLE_SCRIPT_URL+'?action=load_menu',{redirect:'follow'});
      const json=await check.json();
      setSyncStatus(json.status==='success'?'saved':'error');
    }catch(e){
      setSyncStatus('local'); // guardado local, nube no confirmada
    }
    setTimeout(()=>setSyncStatus(''),3000);
  };
  const [view,setView]=useState('hero');
  const toggleImages=(v)=>{setImagesEnabled(v);try{localStorage.setItem('paranoia-images',String(v));}catch(e){};saveData({...data,imagesEnabled:v});};
  useEffect(()=>{document.body.style.overflow='hidden';document.body.style.height='100%';return()=>{document.body.style.overflow='';document.body.style.height='';};},[]);
  // Topbar height observer
  useEffect(()=>{
    if(!topbarRef.current)return;
    const ro=new ResizeObserver(()=>{const h=topbarRef.current?.offsetHeight||100;document.documentElement.style.setProperty('--topbar-h',h+'px');});
    ro.observe(topbarRef.current);
    return()=>ro.disconnect();
  },[]);
  // Section animation observer
  useEffect(()=>{
    const observer=new IntersectionObserver((entries)=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');observer.unobserve(e.target);}});},{threshold:0.1,rootMargin:'0px 0px -40px 0px'});
    const timer=setTimeout(()=>{document.querySelectorAll('.section-animate,.section-animate-left,.section-animate-right,.section-animate-scale').forEach(el=>observer.observe(el));},500);
    return()=>{clearTimeout(timer);observer.disconnect();};
  },[view]);
  const goMenu=()=>{setActiveCat('especial');setView('menu');};
  const goAbout=()=>setView('about');
  const goRating=()=>setView('rating');
  const goHero=()=>setView('hero');
  const scrollTo=(catId)=>{
    if(catId===activeCat||flipState!=='idle')return;
    const cats=data.categories.filter(c=>data.items.some(i=>i.cat===c.id));
    const curIdx=cats.findIndex(c=>c.id===activeCat);
    const newIdx=cats.findIndex(c=>c.id===catId);
    setFlipDir(newIdx>=curIdx?'right':'left');
    setFlipState('out');
    setPendingCat(catId);
    setTimeout(()=>{setActiveCat(catId);setFlipState('in');setTimeout(()=>setFlipState('idle'),380);},260);
  };
  const handleTap=()=>{const c=tapCount+1;setTapCount(c);if(c>=5){setShowLogin(true);setTapCount(0);}setTimeout(()=>setTapCount(0),2000);};

  return(<>
    <style>{CSS}</style>
    {/* SPLASH */}
    <div className={`splash ${splashDone?'done':''}`}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8}}>
        <img src={ISOTIPO_B64} alt="" style={{width:60,height:60,objectFit:'contain',opacity:.85,animation:'isotipoIn .9s cubic-bezier(.23,1,.32,1)'}}/>
        <div className="splash-logo" style={{animation:'logoReveal 1s cubic-bezier(.23,1,.32,1) .3s both'}}><span style={{color:'var(--gold)'}}>P</span>aranoia</div>
      </div>
      <div className="splash-sub" style={{animation:'subtitleReveal .9s ease .6s both'}}>RESTOBAR</div>
      <div className="splash-line"/>
      <div className="splash-bar"><div className="splash-bar-fill"/></div>
    </div>
    {/* ADMIN */}
    {showLogin&&<LoginModal onSuccess={()=>{setShowLogin(false);setShowAdmin(true);}} onClose={()=>setShowLogin(false)}/>}
    {showAdmin&&<AdminPanel data={data} syncStatus={syncStatus} onSave={(d)=>{saveData(d);}} onClose={()=>setShowAdmin(false)} imagesEnabled={imagesEnabled} onToggleImages={toggleImages}/>}
    {selectedItem&&<DetailModal item={selectedItem} onClose={()=>setSelectedItem(null)} imagesEnabled={imagesEnabled}/>}

    {/* MAIN VIEW WRAPPER */}
    <div className="view-wrap">

      {/* ═══ HERO VIEW ═══ */}
      <div className={`view-panel ${view==='hero'?'view-active':'view-hidden'}`} style={{display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{position:'absolute',inset:0,zIndex:0,overflow:'hidden',pointerEvents:'none'}}>
          <video autoPlay muted loop playsInline preload="auto" style={{position:'absolute',top:'50%',left:'50%',minWidth:'120%',minHeight:'120%',width:'auto',height:'auto',transform:'translate(-50%,-50%)',opacity:.32,objectFit:'cover',filter:'brightness(.65) saturate(1.3) contrast(1.1)'}}>
            <source src="https://assets.mixkit.co/videos/4043/4043-1080.mp4" type="video/mp4"/>
            <source src="https://assets.mixkit.co/videos/8711/8711-1080.mp4" type="video/mp4"/>
            <source src="https://assets.mixkit.co/videos/3461/3461-720.mp4" type="video/mp4"/>
          </video>
        </div>
        {/* Smoke effects */}
        <div className="smoke-effect" style={{left:'10%',animationDelay:'0s',animationDuration:'14s'}}/>
        <div className="smoke-effect" style={{right:'15%',animationDelay:'4s',animationDuration:'18s'}}/>
        <div className="smoke-effect" style={{left:'50%',animationDelay:'8s',animationDuration:'16s'}}/>
        {/* Floating rings */}
        <div className="floating-ring" style={{width:500,height:500,top:'-15%',right:'-10%',animationDuration:'50s'}}/>
        <div className="floating-ring" style={{width:350,height:350,bottom:'-10%',left:'-5%',animationDuration:'35s',animationDirection:'reverse'}}/>
        <div className="hero-bg"/>
        <div className="hero-orb hero-orb-1"/>
        <div className="hero-orb hero-orb-2"/>
        <div className="hero-orb hero-orb-3"/>
        <div className="ghost-letters" aria-hidden="true"><span className="ghost-text">PARANOIA</span></div>
        <div style={{position:'absolute',inset:0,overflow:'hidden',zIndex:2}}>
          {Array.from({length:30},(_,i)=><div key={i} className="particle" style={{left:`${5+Math.random()*90}%`,top:`${10+Math.random()*80}%`,animationDelay:`${Math.random()*8}s`,animationDuration:`${5+Math.random()*6}s`,opacity:Math.random()*.5+.15,width:Math.random()>0.7?3:2,height:Math.random()>0.7?3:2}}/>)}
        </div>
        <div style={{position:'relative',zIndex:3,textAlign:'center',padding:'0 24px',display:'flex',flexDirection:'column',alignItems:'center'}}>
          <div className="hero-line"/>
          <img src={ISOTIPO_B64} alt="" aria-hidden="true" className="hero-isotipo" style={{width:'clamp(44px,9vw,72px)',height:'clamp(44px,9vw,72px)',objectFit:'contain',marginBottom:8,filter:'drop-shadow(0 0 18px rgba(201,168,76,.45))'}}/>
          <h1 onClick={handleTap} className="paranoia-logo hero-title" style={{marginBottom:6}}><span className="logo-p">P</span>aranoia</h1>
          <p className="logo-restobar hero-sub" style={{marginBottom:28}}>RESTOBAR</p>
          <p className="hero-tagline gold-shimmer-text" style={{fontFamily:'var(--serif)',fontSize:'clamp(15px,2.8vw,21px)',fontStyle:'italic',marginBottom:36,display:'inline-block'}}>Donde cada plato cuenta una historia</p>
          <button className="btn-gold hero-btn1" onClick={goMenu} style={{fontSize:15,padding:'14px 48px',marginBottom:14,boxShadow:'0 8px 32px rgba(201,168,76,.3)'}}>Explorar Menú</button>
          <button className="btn-outline hero-btn2" onClick={goRating} style={{fontSize:13,padding:'12px 32px',marginBottom:28}}>⭐ Calificar Restaurante</button>
          <div className="hero-social"><SocialIcons social={data.social}/></div>
        </div>
        <div style={{position:'absolute',bottom:28,left:'50%',transform:'translateX(-50%)',zIndex:3,opacity:.45,animation:'float 3s ease-in-out infinite'}}>
          <div style={{width:20,height:32,borderRadius:10,border:'1.5px solid var(--gold-dark)',display:'flex',justifyContent:'center',paddingTop:6}}>
            <div style={{width:3,height:8,borderRadius:2,background:'var(--gold)',animation:'fadeIn 1.5s ease infinite alternate'}}/>
          </div>
        </div>
      </div>

      {/* ═══ MENU VIEW ═══ */}
      <div className={`view-panel mesh-bg ${view==='menu'?'view-active':'view-hidden'}`} style={{display:'flex',flexDirection:'column'}}>
        {/* Top bar — 1 fila desktop / 2 filas móvil */}
        <div className="menu-topbar" ref={topbarRef}>
          <button className="menu-topbar-logo" onClick={goHero}>
            <img src={ISOTIPO_B64} alt="" style={{width:22,height:22,objectFit:'contain',opacity:.85}}/>
            <span><span style={{color:'var(--gold)'}}>P</span>aranoia</span>
          </button>
          {/* Desktop: pills scrollables */}
          <div className="menu-cats-wrap">
            <div className="menu-cats">
              {data.categories.map(cat=>{
                const n=data.items.filter(i=>i.cat===cat.id).length;
                if(!n)return null;
                return(<button key={cat.id} className={`cat-pill ${activeCat===cat.id?'active':''}`} onClick={()=>scrollTo(cat.id)}>{cat.icon} {cat.name}</button>);
              })}
            </div>
          </div>
          {/* Móvil: navegador con flechas */}
          {(()=>{const cats=data.categories.filter(c=>data.items.some(i=>i.cat===c.id));const curIdx=cats.findIndex(c=>c.id===activeCat);const ac=cats[curIdx]||cats[0];const prev=cats[(curIdx-1+cats.length)%cats.length];const next=cats[(curIdx+1)%cats.length];return(
            <div className="cat-nav-mobile">
              <button className="cat-nav-arrow" onClick={()=>scrollTo(prev.id)}>◀</button>
              <button className="cat-nav-center" onClick={()=>setSheetOpen(true)}>
                <span className="cat-nav-icon">{ac.icon}</span>
                <span className="cat-nav-name">{ac.name}</span>
                <span className="cat-nav-grid-icon">⋮⋮</span>
              </button>
              <button className="cat-nav-arrow" onClick={()=>scrollTo(next.id)}>▶</button>
            </div>
          );})()}
          <div className="menu-actions">
            <button className="btn-outline" onClick={goAbout} style={{fontSize:11,padding:'7px 14px',whiteSpace:'nowrap'}}>Nosotros</button>
            <button className="btn-outline" onClick={goRating} style={{fontSize:11,padding:'7px 14px',whiteSpace:'nowrap'}}>⭐</button>
          </div>
        </div>
        {/* BOTTOM SHEET de categorías (solo móvil) */}
        <div className={`cat-sheet-overlay ${sheetOpen?'open':''}`} onClick={()=>setSheetOpen(false)}/>
        <div className={`cat-sheet ${sheetOpen?'open':''}`}>
          <div className="cat-sheet-handle"/>
          <div className="cat-sheet-title">Selecciona una categoría</div>
          <div className="cat-sheet-grid">
            {data.categories.map(cat=>{
              const n=data.items.filter(i=>i.cat===cat.id).length;
              if(!n)return null;
              return(
                <button key={cat.id} className={`cat-sheet-btn ${activeCat===cat.id?'active':''}`} onClick={()=>{scrollTo(cat.id);setSheetOpen(false);}}>
                  <span className="cat-sheet-icon">{cat.icon}</span>
                  <span className="cat-sheet-name">{cat.name}</span>
                </button>
              );
            })}
          </div>
        </div>
        {/* Scrollable content */}
        <div className="menu-content" style={{paddingTop:'var(--topbar-h,100px)'}}>
          <div style={{maxWidth:1200,margin:'0 auto',padding:'28px 20px 80px',position:'relative'}}>
            <div className="ghost-letters-menu" aria-hidden="true"><span className="ghost-text-menu">P</span></div>
            {data.categories.map(cat=>{const items=data.items.filter(i=>i.cat===cat.id);if(!items.length)return null;const th=CAT_THEMES[cat.id]||CAT_THEMES.especial;const active=activeCat===cat.id;return(
              <section key={cat.id} id={`s-${cat.id}`} style={{display:active?'block':'none',animation:'sectionIn .55s cubic-bezier(.23,1,.32,1)'}}>
                <div className={`cat-section-wrap ${flipState==='out'?(flipDir==='right'?'page-flip-out-right':'page-flip-out-left'):flipState==='in'?(flipDir==='right'?'page-flip-in-right':'page-flip-in-left'):''}`} style={{transformStyle:'preserve-3d'}}>
                  {/* Fondo degradado por categoría */}
                  <div className="cat-section-bg" style={{background:`radial-gradient(ellipse 90% 60% at 15% 20%,rgba(${th.c1},.13) 0%,transparent 55%),radial-gradient(ellipse 70% 50% at 85% 80%,rgba(${th.c2},.1) 0%,transparent 50%),radial-gradient(ellipse 50% 70% at 50% 50%,rgba(${th.c1},.05) 0%,transparent 60%),linear-gradient(160deg,rgba(${th.c1},.07) 0%,rgba(12,10,8,.0) 40%,rgba(${th.c2},.06) 100%)`}}/>
                  {/* Orbs animados */}
                  <div className={`cat-orb cat-orb-1 ${active?'show':''}`} style={{background:`radial-gradient(circle,rgba(${th.c1},.14) 0%,transparent 65%)`}}/>
                  <div className={`cat-orb cat-orb-2 ${active?'show':''}`} style={{background:`radial-gradient(circle,rgba(${th.c2},.11) 0%,transparent 60%)`}}/>
                  <div className={`cat-orb cat-orb-3 ${active?'show':''}`} style={{background:`radial-gradient(circle,rgba(${th.c3},.07) 0%,transparent 60%)`}}/>
                  {/* Textura grain */}
                  <div className="grain-overlay"/>
                  {/* Borde sutil */}
                  <div className="cat-glow-border" style={{borderColor:`rgba(${th.c1},.14)`}}/>
                  {/* Contenido */}
                  <div className="cat-section-inner">
                    <div className="section-animate" style={{display:'flex',alignItems:'center',gap:16,marginBottom:24}}>
                      <div style={{width:54,height:54,borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,background:`linear-gradient(135deg,rgba(${th.c1},.18),rgba(${th.c1},.05))`,border:`1px solid rgba(${th.c1},.28)`,flexShrink:0,boxShadow:`0 4px 24px rgba(${th.c1},.18)`}}>{cat.icon}</div>
                      <div>
                        <h3 style={{fontFamily:'var(--serif)',fontSize:'clamp(22px,4vw,30px)',fontWeight:500,lineHeight:1.2,background:`linear-gradient(90deg,rgba(${th.c3},1),rgba(${th.c1},1))`,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>{cat.name}</h3>
                        <p style={{fontSize:11,color:`rgba(${th.c1},.6)`,marginTop:3,letterSpacing:'.12em',textTransform:'uppercase',fontWeight:500}}>{items.length} {items.length===1?'plato':'platos'}</p>
                      </div>
                    </div>
                    <div style={{width:'100%',height:1,background:`linear-gradient(90deg,rgba(${th.c1},.35),rgba(${th.c1},.1),transparent)`,marginBottom:24}}/>
                    <div style={{display:'grid',gridTemplateColumns:imagesEnabled?'repeat(auto-fill,minmax(280px,1fr))':'1fr',gap:imagesEnabled?20:2,'--cat-r':th.c1}}>{items.map((item,i)=><MenuCard key={item.id} item={item} onClick={setSelectedItem} delay={i*.06} imagesEnabled={imagesEnabled} catColor={th.c1}/>)}</div>
                  </div>
                </div>
              </section>);})}
          </div>
        </div>
      </div>

      {/* ═══ ABOUT VIEW ═══ */}
      <div className={`view-panel mesh-bg ${view==='about'?'view-active':'view-hidden'}`} style={{overflowY:'auto'}}>
        <div className="subview-bar">
          <button className="back-btn" onClick={goHero}>← Inicio</button>
          <button className="back-btn" onClick={goMenu}>📖 Menú</button>
          <button className="back-btn" onClick={goRating}>⭐ Calificar</button>
        </div>
        <div style={{maxWidth:800,margin:'0 auto',padding:'0 20px 100px'}}>
          <div className="section-animate" style={{textAlign:'center',marginBottom:40}}>
            <p className="gold-shimmer-text" style={{fontSize:12,fontWeight:600,letterSpacing:'.3em',textTransform:'uppercase',marginBottom:12,display:'inline-block'}}>Conócenos</p>
            <h2 style={{fontFamily:'var(--serif)',fontSize:'clamp(28px,5vw,42px)',fontWeight:400,color:'var(--text)'}}>Sobre Nosotros</h2>
            <div className="premium-divider"/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:32,alignItems:'start'}}>
            <div className="section-animate-left">
              <p style={{fontSize:15,lineHeight:1.9,color:'var(--text-muted)',marginBottom:20}}><span style={{fontFamily:'var(--serif)',fontSize:20,color:'var(--gold)',fontWeight:600}}>Paranoia RESTOBAR</span> {data.about.p1}</p>
              <p style={{fontSize:15,lineHeight:1.9,color:'var(--text-muted)',marginBottom:20}}>{data.about.p2}</p>
              <p style={{fontSize:15,lineHeight:1.9,color:'var(--text-muted)'}}>{data.about.p3}</p>
              <div style={{marginTop:24}}><SocialIcons social={data.social}/></div>
            </div>
            <div className="section-animate-right" style={{display:'flex',flexDirection:'column',gap:16}}>
              {[{icon:'📍',title:'Ubicación',text:data.info.address},{icon:'🕐',title:'Horario',text:data.info.hours},{icon:'📞',title:'Reservaciones',text:data.info.phone},{icon:'📸',title:'Instagram',text:data.info.ig}].map((info,i)=>(
                <div key={i} className="premium-glow-card" style={{display:'flex',gap:14,alignItems:'center',background:'rgba(255,255,255,.03)',border:'1px solid rgba(201,168,76,.1)',borderRadius:14,padding:'16px 20px',backdropFilter:'blur(10px)',transition:'all .4s',transitionDelay:`${i*0.1}s`}} onMouseOver={e=>{e.currentTarget.style.transform='translateX(8px)';e.currentTarget.style.borderColor='rgba(201,168,76,.25)';}} onMouseOut={e=>{e.currentTarget.style.transform='translateX(0)';e.currentTarget.style.borderColor='rgba(201,168,76,.1)';}}>
                  <span style={{fontSize:28,flexShrink:0,filter:'drop-shadow(0 2px 8px rgba(201,168,76,.3))'}}>{info.icon}</span>
                  <div><p style={{fontSize:10,textTransform:'uppercase',letterSpacing:'.2em',color:'var(--gold)',marginBottom:3,fontWeight:600}}>{info.title}</p><p style={{fontSize:14,color:'var(--text)'}}>{info.text}</p></div>
                </div>))}
            </div>
          </div>
          {/* Footer mini */}
          <div className="section-animate-scale" style={{marginTop:60,textAlign:'center',borderTop:'1px solid rgba(201,168,76,.08)',paddingTop:32}}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',marginBottom:16}}>
              <img src={ISOTIPO_B64} alt="" style={{width:36,height:36,objectFit:'contain',opacity:.6,marginBottom:8}}/>
              <span style={{fontFamily:'var(--serif)',fontSize:22,color:'var(--text-muted)'}}><span style={{color:'var(--gold)'}}>P</span>aranoia</span>
            </div>
            <SocialIcons social={data.social}/>
            <p style={{fontSize:11,color:'var(--text-muted)',opacity:.5,marginTop:16}}>{data.info.ig} · © 2026 Paranoia RESTOBAR</p>
          </div>
        </div>
      </div>

      {/* ═══ RATING VIEW ═══ */}
      <div className={`view-panel mesh-bg ${view==='rating'?'view-active':'view-hidden'}`} style={{overflowY:'auto'}}>
        <div className="subview-bar">
          <button className="back-btn" onClick={goHero}>← Inicio</button>
          <button className="back-btn" onClick={goMenu}>📖 Menú</button>
          <button className="back-btn" onClick={goAbout}>💬 Nosotros</button>
        </div>
        <div style={{maxWidth:800,margin:'0 auto',padding:'0 20px 100px'}}>
          <div className="section-animate" style={{textAlign:'center',marginBottom:40}}>
            <p className="gold-shimmer-text" style={{fontSize:12,fontWeight:600,letterSpacing:'.3em',textTransform:'uppercase',marginBottom:12,display:'inline-block'}}>Tu Opinión</p>
            <h2 style={{fontFamily:'var(--serif)',fontSize:'clamp(28px,5vw,42px)',fontWeight:400,color:'var(--text)'}}>Califica tu Experiencia</h2>
            <div className="premium-divider"/>
          </div>
          <div className="section-animate"><RatingSection waitresses={data.waitresses}/></div>
        </div>
      </div>

    </div>{/* end view-wrap */}

    {/* MOBILE BOTTOM NAV */}
    <div className="bottom-nav-mobile">
      <button className={`bottom-nav-btn ${view==='hero'?'active':''}`} onClick={goHero}><span>🏠</span><span>Inicio</span></button>
      <button className={`bottom-nav-btn ${view==='menu'?'active':''}`} onClick={goMenu}><span>📖</span><span>Menú</span></button>
      <button className={`bottom-nav-btn ${view==='about'?'active':''}`} onClick={goAbout}><span>💬</span><span>Nosotros</span></button>
      <button className={`bottom-nav-btn ${view==='rating'?'active':''}`} onClick={goRating}><span>⭐</span><span>Calificar</span></button>
    </div>

  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
