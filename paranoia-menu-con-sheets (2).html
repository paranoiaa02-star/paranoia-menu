const Tag = ({label}) => <span className={`tag tag-${label}`}>{label}</span>;

const ImgUpload = ({value, onChange, label="Imagen"}) => {
  const fileRef = useRef(null);
  const toBase64 = (file) => new Promise((res,rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); });
  return (
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      <label style={{fontSize:10,color:'var(--gold-dark)',textTransform:'uppercase',letterSpacing:'.1em'}}>{label}</label>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        <input className="adm" value={typeof value==='string'&&!value.startsWith('data:')?value:''} onChange={e=>onChange(e.target.value)} placeholder="URL de imagen o sube archivo" style={{fontSize:11,flex:1}}/>
        <button onClick={()=>fileRef.current?.click()} style={{padding:'8px 12px',borderRadius:8,border:'1px solid rgba(201,168,76,.2)',background:'rgba(201,168,76,.06)',color:'var(--gold)',fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}}>📁 Subir</button>
        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={async e=>{const f=e.target.files?.[0];if(f){const b=await toBase64(f);onChange(b);}}}/>
      </div>
      {value && <div style={{display:'flex',gap:6,alignItems:'center'}}>
        <img src={value} alt="" style={{width:60,height:40,borderRadius:6,objectFit:'cover',background:'#1a1512'}}/>
        <button onClick={()=>onChange('')} style={{padding:'4px 10px',borderRadius:6,border:'1px solid rgba(239,83,80,.3)',background:'rgba(239,83,80,.08)',color:'#EF5350',fontSize:10,cursor:'pointer'}}>🗑 Eliminar foto</button>
      </div>}
    </div>
  );
};

const MenuCard = ({item, onClick, delay=0}) => {
  const [ld,setLd]=useState(false);const [err,setErr]=useState(false);const ref=useRef(null);const [vis,setVis]=useState(false);
  useEffect(()=>{const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVis(true);o.disconnect();}},{threshold:.05});if(ref.current)o.observe(ref.current);return()=>o.disconnect();},[]);
  const ico={cocteles:'🍸',bebidas:'☕',postres:'🍰',mariscos:'🦞',pasta:'🍝',grill:'🔥',cortes:'🥩',rapidos:'🍔',especial:'⭐'};
  return (<div ref={ref} className="menu-card" onClick={()=>item.available&&onClick(item)} style={{opacity:vis?1:0,transform:vis?'translateY(0)':'translateY(30px)',transition:`all .6s cubic-bezier(.23,1,.32,1) ${delay}s`,filter:item.available?'none':'grayscale(.5) opacity(.6)'}}>
    <div style={{position:'relative',width:'100%',height:200,overflow:'hidden',background:'#1a1512'}}>
      {!err&&<img src={item.img} alt={item.name} className="card-img" onLoad={()=>setLd(true)} onError={()=>setErr(true)} style={{position:'absolute',inset:0,opacity:ld?1:0,transition:'opacity .5s'}}/>}
      {!ld&&!err&&<div style={{position:'absolute',inset:0,background:'linear-gradient(90deg,#1a1512 25%,#241e18 50%,#1a1512 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>}
      {err&&<div style={{position:'absolute',inset:0,background:'linear-gradient(135deg,#1a1410,#2a2018,#1a1410)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8}}><span style={{fontSize:36,opacity:.4}}>{ico[item.cat]||'🍽️'}</span><span style={{fontSize:10,color:'var(--gold-dark)',letterSpacing:'.1em',textTransform:'uppercase'}}>Paranoia</span></div>}
      <div style={{position:'absolute',bottom:0,left:0,right:0,height:'50%',background:'linear-gradient(transparent,rgba(0,0,0,.8))'}}/>
      {item.tags?.length>0&&<div style={{position:'absolute',top:10,left:10,display:'flex',flexWrap:'wrap',gap:4}}>{item.tags.map(t=><Tag key={t} label={t}/>)}</div>}
      {!item.available&&<div style={{position:'absolute',top:10,right:10}}><Tag label="agotado"/></div>}
    </div>
    <div style={{padding:'16px 18px 18px'}}>

  const add=(c)=>{const nid=Math.max(...d.items.map(i=>i.id),0)+1;setD(p=>({...p,items:[...p.items,{id:nid,cat:c,name:'Nuevo Plato',desc:'Descripción',price:0,img:'https://images.pexels.com/photos/1640777/pexels-photo-1640777.jpeg?auto=compress&cs=tinysrgb&w=800',tags:[],available:true}]}));};

        </div>

        <button onClick={()=>{if(confirm(`¿Eliminar categoría "${cat.name}"? Los platos de esta categoría quedarán sin categoría.`)){setD(p=>({...p,categories:p.categories.filter((_,idx)=>idx!==i)}));}}} style={{width:32,height:32,borderRadius:8,border:'1px solid rgba(239,83,80,.3)',background:'rgba(239,83,80,.08)',color:'#EF5350',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>🗑</button>
      </div>)}
      <button onClick={()=>{const id='cat_'+Date.now();setD(p=>({...p,categories:[...p.categories,{id,name:'Nueva Categoría',icon:'🍽️'}]}));}} className="btn-outline" style={{width:'100%',marginTop:12,padding:'12px'}}>+ Agregar Categoría</button>
    </div>}

    {/* ABOUT */}
    {tab==='about'&&<div style={{display:'flex',flexDirection:'column',gap:12}}>
      <label style={{fontSize:11,color:'var(--gold)'}}>Párrafo 1</label>
      <textarea className="adm" value={d.about.p1} onChange={e=>setD(p=>({...p,about:{...p.about,p1:e.target.value}}))} rows={4} style={{resize:'vertical'}}/>

      <label style={{fontSize:11,color:'var(--gold)'}}>Párrafo 3</label>
      <textarea className="adm" value={d.about.p3} onChange={e=>setD(p=>({...p,about:{...p.about,p3:e.target.value}}))} rows={4} style={{resize:'vertical'}}/>
    </div>}

    {/* SOCIAL LINKS */}
    {tab==='social'&&<div style={{display:'flex',flexDirection:'column',gap:14}}>
      {[{k:'instagram',l:'Instagram',ic:'📸'},{k:'facebook',l:'Facebook',ic:'👤'},{k:'whatsapp',l:'WhatsApp',ic:'💬'}].map(s=>(
        <div key={s.k} className="admin-card" style={{display:'flex',gap:12,alignItems:'center'}}>
          <span style={{fontSize:24}}>{s.ic}</span>

          <input className="adm" value={d.social[s.k]} onChange={e=>setD(p=>({...p,social:{...p.social,[s.k]:e.target.value}}))} placeholder={`Link de ${s.l}`} style={{marginTop:4,fontSize:12}}/></div>
        </div>
      ))}
    </div>}

    {/* WAITRESSES */}
    {tab==='waitresses'&&<div style={{display:'flex',flexDirection:'column',gap:12}}>
      <p style={{fontSize:12,color:'var(--text-muted)',marginBottom:8}}>Edita las meseras que se muestran en la sección de calificación</p>

        <div style={{display:'grid',gridTemplateColumns:'70px 1fr 36px',gap:14,alignItems:'start'}}>
          {w.img ? <img src={w.img} alt="" style={{width:70,height:70,borderRadius:12,objectFit:'cover',background:'#1a1512'}}/> : <div style={{width:70,height:70,borderRadius:12,background:'#1a1512',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,border:'1px dashed rgba(201,168,76,.2)'}}>👩‍🍳</div>}

// ─── RATING ───
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz7zIl384HG528OKvCkha5N9pzor7bYMJGW2ZAA7vh0rt3B_ifguN9CbeaxlWVgbc08/exec';

const StarInput = ({value, onSelect, label}) => {
  const [hov,setHov]=useState(0);
  return(<div style={{textAlign:'center',padding:14,borderRadius:12,background:'rgba(255,255,255,.02)',border:'1px solid rgba(201,168,76,.06)'}}>
    <p style={{fontSize:12,color:'var(--text-muted)',marginBottom:8}}>{label}</p>
    <div style={{display:'flex',gap:6,justifyContent:'center'}}>
      {[1,2,3,4,5].map(s=>(
        <span key={s} role="button" tabIndex={0}
          onMouseEnter={()=>setHov(s)} onMouseLeave={()=>setHov(0)}
          onClick={()=>onSelect(s)}
          style={{fontSize:28,cursor:'pointer',display:'inline-block',lineHeight:1,userSelect:'none',WebkitTapHighlightColor:'transparent',transition:'transform .15s',transform:s<=(hov||value)?'scale(1.1)':'scale(1)'}}
        >{s<=(hov||value)?'⭐':'☆'}</span>
      ))}
    </div>
    {value>0&&<p style={{fontSize:10,color:'var(--gold)',marginTop:4}}>{value}/5</p>}
  </div>);
};

const RatingSection = ({waitresses}) => {
  const [food,setFood]=useState(0);
  const [service,setService]=useState(0);
  const [ambience,setAmbience]=useState(0);
  const [waitress,setWaitress]=useState('');
  const [name,setName]=useState('');
  const [comment,setComment]=useState('');
  const [submitted,setSubmitted]=useState(false);
  const [sending,setSending]=useState(false);
  const [reviews,setReviews]=useState([]);
  
  useEffect(()=>{try{const v=localStorage.getItem('paranoia-reviews');if(v)setReviews(JSON.parse(v));}catch(e){}},[]);
  
  const canSubmit = food > 0 && !sending;
  
  const handleSubmit=()=>{
    if(!canSubmit)return;
    setSending(true);
    const rev={name:name||'Anónimo',food,service,ambience,waitress,comment,date:new Date().toLocaleDateString('es-EC')};
    const up=[rev,...reviews].slice(0,30);
    setReviews(up);
    try{localStorage.setItem('paranoia-reviews',JSON.stringify(up));}catch(e){}
    // Enviar a Google Sheets
    try{
      const params=new URLSearchParams({
        action:'submit',
        nombre:name||'Anónimo',
        comida:String(food),
        servicio:String(service),
        ambiente:String(ambience),
        mesera:waitress||'No especificada',
        comentario:comment||''
      });
      const img=new Image();
      img.src=GOOGLE_SCRIPT_URL+'?'+params.toString();
    }catch(e){}
    setTimeout(()=>{
      setSending(false);
      setSubmitted(true);
      setTimeout(()=>{
        setSubmitted(false);
        setFood(0);setService(0);setAmbience(0);setWaitress('');setName('');setComment('');
      },3500);
    },800);
  };
  
  const avg=(field)=>{const r=reviews.filter(x=>x[field]);return r.length?(r.reduce((s,x)=>s+(x[field]||0),0)/r.length).toFixed(1):'—';};

  return(<div>
    <div style={{background:'var(--bg-card)',border:'1px solid rgba(201,168,76,.1)',borderRadius:16,padding:'28px 24px',maxWidth:600,margin:'0 auto'}}>
      {submitted?(<div style={{textAlign:'center',animation:'scaleIn .4s',padding:20}}><div style={{fontSize:48,marginBottom:12}}>🙏</div><h3 style={{fontFamily:'var(--serif)',fontSize:22,color:'var(--gold)',marginBottom:8}}>¡Gracias por tu opinión!</h3><p style={{fontSize:13,color:'var(--text-muted)'}}>Tu encuesta fue enviada a nuestra base de datos</p></div>):(<>
        {/* Waitress selection */}
        {waitresses?.length>0&&<div style={{marginBottom:20}}>
          <p style={{fontSize:12,color:'var(--text-muted)',marginBottom:10,textAlign:'center'}}>¿Quién te atendió?</p>
          <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
            {waitresses.map(w=>(<div key={w.id} onClick={()=>setWaitress(w.name)} style={{cursor:'pointer',textAlign:'center',padding:8,borderRadius:12,border:`2px solid ${waitress===w.name?'var(--gold)':'rgba(201,168,76,.1)'}`,background:waitress===w.name?'rgba(201,168,76,.06)':'transparent',transition:'all .3s',minWidth:70}}>
              <img src={w.img} alt={w.name} style={{width:50,height:50,borderRadius:'50%',objectFit:'cover',marginBottom:6,border:waitress===w.name?'2px solid var(--gold)':'2px solid transparent'}}/>
              <p style={{fontSize:11,color:waitress===w.name?'var(--gold)':'var(--text-muted)',fontWeight:waitress===w.name?600:400}}>{w.name}</p>
            </div>))}
          </div>
        </div>}
        {/* Ratings */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:16,marginBottom:20}}>
          <StarInput value={food} onSelect={setFood} label="🍽️ Comida"/>
          <StarInput value={service} onSelect={setService} label="👩‍🍳 Servicio"/>
          <StarInput value={ambience} onSelect={setAmbience} label="✨ Ambiente"/>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <input className="adm" placeholder="Tu nombre (opcional)" value={name} onChange={e=>setName(e.target.value)}/>
          <textarea className="adm" placeholder="Cuéntanos tu experiencia..." value={comment} onChange={e=>setComment(e.target.value)} rows={3} style={{resize:'vertical'}}/>
          <div role="button" onClick={handleSubmit} style={{width:'100%',padding:'14px 32px',borderRadius:30,border:'none',background:canSubmit?'linear-gradient(135deg,#C9A84C,#8A7235)':'rgba(201,168,76,.2)',color:canSubmit?'#0C0A08':'#8A8478',fontFamily:'var(--sans)',fontSize:15,fontWeight:700,cursor:canSubmit?'pointer':'default',transition:'all .3s',textAlign:'center',boxShadow:canSubmit?'0 8px 30px rgba(201,168,76,.3)':'none',letterSpacing:'.02em'}}>{sending?'⏳ Enviando...':'⭐ Enviar Calificación'}</div>
          {food===0&&<p style={{fontSize:11,color:'var(--text-muted)',textAlign:'center'}}>Califica al menos la comida para enviar</p>}
          <p style={{fontSize:10,color:'var(--gold-dark)',textAlign:'center',marginTop:2,letterSpacing:'.05em'}}>🔗 Conectado a base de datos en la nube</p>
        </div>
      </>)}
    </div>
    {reviews.length>0&&<div style={{marginTop:28}}>
      <div style={{display:'flex',justifyContent:'center',gap:24,marginBottom:20,flexWrap:'wrap'}}>
        {[{k:'food',l:'Comida'},{k:'service',l:'Servicio'},{k:'ambience',l:'Ambiente'}].map(c=>(
          <div key={c.k} style={{textAlign:'center'}}><span style={{fontFamily:'var(--serif)',fontSize:28,fontWeight:700,color:'var(--gold)'}}>{avg(c.k)}</span><p style={{fontSize:10,color:'var(--text-muted)'}}>{c.l}</p></div>
        ))}
      </div>
      <div style={{display:'grid',gap:10,maxWidth:600,margin:'0 auto'}}>
        {reviews.slice(0,5).map((r,i)=>(<div key={i} style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(201,168,76,.06)',borderRadius:12,padding:'12px 16px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}><span style={{fontWeight:600,fontSize:13}}>{r.name}</span><span style={{fontSize:10,color:'var(--text-muted)'}}>{r.date}</span></div>
          <div style={{display:'flex',gap:12,fontSize:11,color:'var(--text-muted)',marginBottom:4}}>
            {r.food&&<span>Comida {'⭐'.repeat(r.food)}</span>}{r.service&&<span>Servicio {'⭐'.repeat(r.service)}</span>}{r.ambience&&<span>Ambiente {'⭐'.repeat(r.ambience)}</span>}
          </div>
          {r.waitress&&<p style={{fontSize:11,color:'var(--gold-dark)'}}>Atendido por: {r.waitress}</p>}
          {r.comment&&<p style={{fontSize:12,color:'var(--text-muted)',lineHeight:1.5,marginTop:4}}>{r.comment}</p>}
        </div>))}
      </div>
    </div>}
  </div>);
};

// ═══ MAIN ═══
function App() {
  const [data,setData]=useState(D);
  const [activeCat,setActiveCat]=useState('grill');
  const [selectedItem,setSelectedItem]=useState(null);
  const [showLogin,setShowLogin]=useState(false);
  const [showAdmin,setShowAdmin]=useState(false);
  const [navVisible,setNavVisible]=useState(false);
  const [heroLoaded,setHeroLoaded]=useState(false);
  const [showScrollTop,setShowScrollTop]=useState(false);
  const [showCatBar,setShowCatBar]=useState(false);
  const [tapCount,setTapCount]=useState(0);
  const menuRef=useRef(null);
  const isScrollingRef=useRef(false);

  const [menuLoading,setMenuLoading]=useState(true);
  const [syncStatus,setSyncStatus]=useState('');

  useEffect(()=>{
    // Intentar cargar menú desde la nube (Google Sheets)
    const loadCloud=async()=>{
      try{
        const ctrl=new AbortController();
        const timeout=setTimeout(()=>ctrl.abort(),6000);
        const r=await fetch(GOOGLE_SCRIPT_URL+'?action=load_menu',{signal:ctrl.signal,redirect:'follow'});
        clearTimeout(timeout);
        const json=await r.json();
        if(json.status==='success'&&json.data){
          setData(json.data);
          try{localStorage.setItem('paranoia-menu-v3',JSON.stringify(json.data));}catch(e){}
          setMenuLoading(false);
          return;
        }
      }catch(e){}
      // Fallback: localStorage o datos por defecto
      try{
        const saved=localStorage.getItem('paranoia-menu-v3');
        const savedVer=localStorage.getItem('paranoia-menu-version');
        if(saved&&savedVer&&parseInt(savedVer)>=MENU_VERSION){
          setData(JSON.parse(saved));
        }else{
          localStorage.removeItem('paranoia-menu-v3');
          localStorage.setItem('paranoia-menu-version',String(MENU_VERSION));
        }
      }catch(e){}
      setMenuLoading(false);
    };
    loadCloud();
    setTimeout(()=>setHeroLoaded(true),300);
  },[]);

  const saveData=async(d)=>{
    setData(d);
    // Guardar local
    try{localStorage.setItem('paranoia-menu-v3',JSON.stringify(d));localStorage.setItem('paranoia-menu-version',String(MENU_VERSION));}catch(e){}
    // Guardar en la nube (Google Sheets via POST)
    setSyncStatus('syncing');
    try{
      const r=await fetch(GOOGLE_SCRIPT_URL,{
        method:'POST',
        mode:'no-cors',
        headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({action:'save_menu',menuData:d})
      });
      // no-cors no da acceso al body, así que asumimos éxito si no hay error
      setSyncStatus('saved');
      setTimeout(()=>{setSyncStatus('');},3000);
    }catch(e){
      setSyncStatus('error');
      setTimeout(()=>setSyncStatus(''),4000);
    }
  };
  useEffect(()=>{const h=()=>{setNavVisible(window.scrollY>window.innerHeight*.7);setShowScrollTop(window.scrollY>600);if(menuRef.current){setShowCatBar(menuRef.current.getBoundingClientRect().bottom<60);}};window.addEventListener('scroll',h);return()=>window.removeEventListener('scroll',h);},[]);
  useEffect(()=>{
    const els=data.categories.map(c=>({id:c.id,el:document.getElementById(`s-${c.id}`)})).filter(s=>s.el);
    const obs=new IntersectionObserver(entries=>{if(isScrollingRef.current)return;const v=entries.filter(e=>e.isIntersecting);if(v.length>0){const id=v[0].target.id.replace('s-','');setActiveCat(id);document.getElementById(`p-${id}`)?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});}},{rootMargin:'-20% 0px -70% 0px',threshold:.1});
    els.forEach(s=>obs.observe(s.el));return()=>obs.disconnect();
  },[data.categories]);

  const scrollTo=(catId)=>{setActiveCat(catId);isScrollingRef.current=true;const el=document.getElementById(`s-${catId}`);if(el){window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-110,behavior:'smooth'});}setTimeout(()=>{isScrollingRef.current=false;},1200);};
  const featured=data.items.filter(i=>i.tags.includes('popular')||i.tags.includes('recomendado')).slice(0,6);
  const scrollToMenu=()=>{const el=menuRef.current;if(el)window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-20,behavior:'smooth'});};
  const scrollToRating=()=>{const el=document.getElementById('rating-section');if(el)window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-60,behavior:'smooth'});};
  const scrollToTop=()=>window.scrollTo({top:0,behavior:'smooth'});
  const handleTap=()=>{const c=tapCount+1;setTapCount(c);if(c>=5){setShowLogin(true);setTapCount(0);}setTimeout(()=>setTapCount(0),2000);};

  return(<>
    <style>{CSS}</style>

    <nav className={`nav-sticky ${navVisible?'visible':''}`}><div style={{maxWidth:1200,margin:'0 auto',padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between'}}><span style={{fontFamily:'var(--serif)',fontSize:22,fontWeight:600,color:'var(--gold)',cursor:'pointer'}} onClick={scrollToTop}>Paranoia</span><div style={{display:'flex',gap:8}}><button className="btn-outline" onClick={scrollToRating} style={{fontSize:12,padding:'7px 14px'}}>⭐ Calificar</button><button className="btn-outline" onClick={scrollToMenu} style={{fontSize:12,padding:'7px 18px'}}>Menú</button></div></div></nav>

    {showScrollTop&&<button className="scroll-top-btn" onClick={scrollToTop} style={{animation:'fadeIn .3s'}}>↑</button>}

    {/* HERO */}
    <section className="hero-section"><div className="hero-bg"/><div style={{position:'absolute',inset:0,overflow:'hidden'}}>{Array.from({length:20},(_,i)=><div key={i} className="particle" style={{left:`${Math.random()*100}%`,top:`${Math.random()*100}%`,animationDelay:`${Math.random()*6}s`,animationDuration:`${4+Math.random()*4}s`,opacity:Math.random()*.4+.1}}/>)}</div>
      <div style={{position:'relative',zIndex:2,textAlign:'center',padding:'0 24px',opacity:heroLoaded?1:0,transform:heroLoaded?'translateY(0)':'translateY(30px)',transition:'all 1s cubic-bezier(.23,1,.32,1) .3s'}}>
        <div style={{width:60,height:1,background:'linear-gradient(90deg,transparent,var(--gold),transparent)',margin:'0 auto 24px'}}/>
        <h1 onClick={handleTap} style={{fontFamily:'var(--serif)',fontSize:'clamp(48px,10vw,90px)',fontWeight:300,color:'var(--text)',letterSpacing:'.05em',lineHeight:1,marginBottom:4,cursor:'default',userSelect:'none'}}><span style={{color:'var(--gold)'}}>P</span>aranoia</h1>
        <p style={{fontFamily:'var(--sans)',fontSize:'clamp(11px,2.5vw,14px)',letterSpacing:'.35em',textTransform:'uppercase',color:'var(--gold-dark)',marginBottom:20}}>Resto & Bar</p>
        <div style={{width:40,height:40,margin:'0 auto 24px',opacity:.4}}><svg viewBox="0 0 40 40" fill="none"><path d="M20 8 C26 8,32 14,32 20 C32 26,26 32,20 32 C14 32,10 28,10 22 C10 18,13 14,18 14 C22 14,25 17,25 20 C25 23,22 26,20 26 C17 26,16 24,16 22 C16 20,18 18,20 18" stroke="#C9A84C" strokeWidth="1.2"/></svg></div>
        <p style={{fontFamily:'var(--serif)',fontSize:'clamp(16px,3vw,22px)',fontStyle:'italic',color:'var(--cream)',marginBottom:32,opacity:.8}}>Donde cada plato cuenta una historia</p>
        <button className="btn-gold" onClick={scrollToMenu} style={{fontSize:15,padding:'14px 42px',animation:heroLoaded?'glow 3s ease-in-out infinite':'none'}}>Explorar Menú</button>
        <div style={{marginTop:16}}><button className="btn-outline" onClick={scrollToRating} style={{fontSize:13,padding:'12px 32px'}}>⭐ Calificar Restaurante</button></div>
        <div style={{marginTop:24}}><SocialIcons social={data.social}/></div>
      </div>
      <div style={{position:'absolute',bottom:30,left:'50%',transform:'translateX(-50%)',opacity:heroLoaded?.4:0,transition:'opacity 1s ease 1.5s',animation:'float 3s ease-in-out infinite'}}><div style={{width:20,height:32,borderRadius:10,border:'1.5px solid var(--gold-dark)',display:'flex',justifyContent:'center',paddingTop:6}}><div style={{width:3,height:8,borderRadius:2,background:'var(--gold)',animation:'fadeIn 1.5s ease infinite alternate'}}/></div></div>
    </section>

    {/* FEATURED */}
    {featured.length>0&&<section style={{maxWidth:1200,margin:'0 auto',padding:'80px 20px 40px'}}>
      <div style={{textAlign:'center',marginBottom:40}}><p style={{fontSize:12,fontWeight:600,letterSpacing:'.3em',textTransform:'uppercase',color:'var(--gold)',marginBottom:8}}>Selección del Chef</p><h2 style={{fontFamily:'var(--serif)',fontSize:'clamp(28px,5vw,42px)',fontWeight:400,color:'var(--text)'}}>Platos Destacados</h2><div style={{width:60,height:1,background:'linear-gradient(90deg,transparent,var(--gold),transparent)',margin:'16px auto 0'}}/></div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:20}}>{featured.map((item,i)=><MenuCard key={item.id} item={item} onClick={setSelectedItem} delay={i*.08}/>)}</div>
    </section>}

    {/* MENU HEADER */}
    <section ref={menuRef} style={{maxWidth:1200,margin:'0 auto',padding:'60px 20px 20px'}}>
      <div style={{textAlign:'center',marginBottom:16}}><p style={{fontSize:12,fontWeight:600,letterSpacing:'.3em',textTransform:'uppercase',color:'var(--gold)',marginBottom:8}}>Nuestra Carta</p><h2 style={{fontFamily:'var(--serif)',fontSize:'clamp(28px,5vw,42px)',fontWeight:400,color:'var(--text)'}}>Menú Completo</h2><div style={{width:60,height:1,background:'linear-gradient(90deg,transparent,var(--gold),transparent)',margin:'16px auto 0'}}/></div>
    </section>

    {/* FIXED CATEGORY BAR */}
    <div style={{position:'fixed',top:navVisible?52:0,left:0,right:0,zIndex:90,background:'rgba(12,10,8,.95)',backdropFilter:'blur(20px)',borderBottom:'1px solid rgba(201,168,76,.1)',transform:showCatBar?'translateY(0)':'translateY(-100%)',transition:'all .4s',padding:0}}>
      <div style={{maxWidth:1200,margin:'0 auto',padding:'10px 16px',display:'flex',gap:8,overflowX:'auto',scrollbarWidth:'none'}}>
        {data.categories.map(cat=>{const n=data.items.filter(i=>i.cat===cat.id).length;if(!n)return null;return(<button key={cat.id} id={`p-${cat.id}`} className={`cat-pill ${activeCat===cat.id?'active':''}`} onClick={()=>scrollTo(cat.id)}>{cat.icon} {cat.name}</button>);})}
        <button className="cat-pill" onClick={()=>{const el=document.getElementById('about-section');if(el){isScrollingRef.current=true;window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-60,behavior:'smooth'});setTimeout(()=>{isScrollingRef.current=false;},1200);}}}>💬 Nosotros</button>
      </div>
    </div>

    {/* SECTIONS */}
    <div style={{maxWidth:1200,margin:'0 auto',padding:'10px 20px 60px'}}>
      {data.categories.map(cat=>{const items=data.items.filter(i=>i.cat===cat.id);if(!items.length)return null;return(
        <section key={cat.id} id={`s-${cat.id}`} style={{marginBottom:64,scrollMarginTop:110}}>
          <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:28,paddingTop:8}}>
            <div style={{width:48,height:48,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,background:'linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.04))',border:'1px solid rgba(201,168,76,.15)',flexShrink:0}}>{cat.icon}</div>
            <div><h3 style={{fontFamily:'var(--serif)',fontSize:'clamp(22px,4vw,30px)',fontWeight:500,color:'var(--text)',lineHeight:1.2}}>{cat.name}</h3><p style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>{items.length} platos</p></div>
          </div>
          <div style={{height:1,background:'linear-gradient(90deg,rgba(201,168,76,.2),rgba(201,168,76,.05),transparent)',marginBottom:24}}/>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:20}}>{items.map((item,i)=><MenuCard key={item.id} item={item} onClick={setSelectedItem} delay={i*.07}/>)}</div>
        </section>);})}
    </div>

    {/* ABOUT */}
    <section id="about-section" style={{padding:'80px 20px',background:'linear-gradient(180deg,rgba(201,168,76,.02) 0%,var(--bg) 100%)'}}>
      <div style={{maxWidth:800,margin:'0 auto'}}>

            {[{icon:'📍',title:'Ubicación',text:data.info.address},{icon:'🕐',title:'Horario',text:data.info.hours},{icon:'📞',title:'Reservaciones',text:data.info.phone},{icon:'📸',title:'Instagram',text:data.info.ig}].map((info,i)=>(
              <div key={i} style={{display:'flex',gap:14,alignItems:'center',background:'var(--bg-card)',border:'1px solid rgba(201,168,76,.08)',borderRadius:12,padding:'14px 18px'}}>

        </div>
        <div style={{width:'100%',height:1,background:'rgba(201,168,76,.1)',marginBottom:20}}/>
        <p style={{fontSize:12,color:'var(--text-muted)',opacity:.6}}>{data.info.ig} · © 2026 Paranoia Resto & Bar</p>
      </div>
    </footer>

    {selectedItem&&<DetailModal item={selectedItem} onClose={()=>setSelectedItem(null)}/>}
    {showLogin&&<LoginModal onSuccess={()=>{setShowLogin(false);setShowAdmin(true);}} onClose={()=>setShowLogin(false)}/>}
    {showAdmin&&<AdminPanel data={data} syncStatus={syncStatus} onSave={(d)=>{saveData(d);}} onClose={()=>setShowAdmin(false)}/>}
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
